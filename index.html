<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 | 함수 기사문 작성 프로그램</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/regression/2.0.1/regression.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 10px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* 섹션 스타일 */
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .section-title { font-weight: bold; font-size: 1.2em; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; }
        
        /* 입력창 스타일 */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 150px; resize: none; }
        
        /* 데이터 테이블 */
        .data-table { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .data-row { background: #f9f9f9; padding: 8px; border-radius: 5px; border: 1px solid #ddd; width: 160px; }
        
        .btn-submit { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background: #357abd; }
        
        #resultArea { margin-top: 30px; display: none; border-top: 3px double #333; padding-top: 20px; }
        @media print { .no-print { display: none; } .container { box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 함수 기사문 작성 수행평가</h1>

    <div class="no-print">
        <div class="section">
            <div class="section-title">1. 학생 정보 및 영역 선택</div>
            <div class="grid-inputs">
                <input type="text" id="studentId" placeholder="학번 (예: 20101)">
                <input type="text" id="studentName" placeholder="이름">
                <select id="funcType">
                    <option value="">분석 영역 선택</option>
                    <option value="exponential">지수함수 영역</option>
                    <option value="logarithmic">로그함수 영역</option>
                    <option value="polynomial">삼각함수 영역 (이차 근사)</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">2. 실생활 데이터 입력 (7~10개)</div>
            <div class="data-table" id="dataInputs"></div>
        </div>

        <div class="section">
            <div class="section-title">3. 기사 내용 작성</div>
            <input type="text" id="articleTitle" placeholder="기사 제목을 입력하세요" style="margin-bottom:10px; font-size:1.1em; font-weight:bold;">
            <div class="grid-inputs" style="margin-bottom:10px;">
                <input type="text" class="ref-link" placeholder="참고자료 1 (URL 또는 문헌명)">
                <input type="text" class="ref-link" placeholder="참고자료 2">
                <input type="text" class="ref-link" placeholder="참고자료 3">
            </div>
            <textarea id="articleContent" placeholder="함수의 특성을 포함하여 기사 본문을 작성하세요..."></textarea>
        </div>

        <button class="btn-submit" onclick="generateArticle()">분석 및 기사 발행하기</button>
    </div>

    <div id="resultArea">
        <h2 id="outTitle" style="text-align:center; font-size:1.8em;"></h2>
        <p style="text-align:right;" id="outInfo"></p>
        <hr>
        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div style="flex: 1; min-width: 300px;">
                <canvas id="outChart"></canvas>
                <p id="outFormula" style="text-align:center; font-weight:bold; color:red; margin-top:10px;"></p>
            </div>
            <div style="flex: 1; min-width: 300px; white-space: pre-wrap; font-size: 1.1em;" id="outContent"></div>
        </div>
        <div id="outRefs" style="margin-top:20px; font-size:0.9em; color:#666;"></div>
        <button class="btn-submit no-print" style="background:#27ae60;" onclick="window.print()">PDF로 저장 / 인쇄하기</button>
    </div>
</div>

<script>
    // 입력창 10개 생성
    const dataInputs = document.getElementById('dataInputs');
    for (let i = 1; i <= 10; i++) {
        dataInputs.innerHTML += `
            <div class="data-row">
                <b>#${i}</b> x: <input type="number" class="x-val" style="width:45px"> y: <input type="number" class="y-val" style="width:45px">
            </div>
        `;
    }

    let chartInstance = null;

    function generateArticle() {
        const id = document.getElementById('studentId').value;
        const name = document.getElementById('studentName').value;
        const type = document.getElementById('funcType').value;
        const title = document.getElementById('articleTitle').value;
        const content = document.getElementById('articleContent').value;

        if(!id || !name || !type || !title) {
            alert("모든 기본 정보와 제목을 입력해주세요!");
            return;
        }

        // 데이터 수집
        let rawData = [];
        const xs = document.querySelectorAll('.x-val');
        const ys = document.querySelectorAll('.y-val');
        for(let i=0; i<10; i++) {
            if(xs[i].value !== "" && ys[i].value !== "") {
                rawData.push([parseFloat(xs[i].value), parseFloat(ys[i].value)]);
            }
        }

        if(rawData.length < 7) {
            alert("데이터를 최소 7개 이상 입력해야 분석이 가능합니다.");
            return;
        }

        rawData.sort((a,b) => a[0] - b[0]);

        // 추세선 계산
        let result;
        if (type === 'exponential') result = regression.exponential(rawData);
        else if (type === 'logarithmic') result = regression.logarithmic(rawData);
        else result = regression.polynomial(rawData, { order: 2 });

        // 결과 화면 표시
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('outTitle').innerText = title;
        document.getElementById('outInfo').innerText = `작성자: ${id} ${name} | 영역: ${type}`;
        document.getElementById('outContent').innerText = content;
        document.getElementById('outFormula').innerText = `분석된 함수식: ${result.string}`;

        // 참고자료 정리
        const refs = document.querySelectorAll('.ref-link');
        let refHtml = "<b>참고자료:</b><br>";
        refs.forEach(r => { if(r.value) refHtml += `- ${r.value}<br>`; });
        document.getElementById('outRefs').innerHTML = refHtml;

        // 그래프 그리기
        drawChart(rawData, result);
        
        window.scrollTo(0, document.getElementById('resultArea').offsetTop);
    }

    function drawChart(rawData, result) {
        const ctx = document.getElementById('outChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const minX = Math.min(...rawData.map(d => d[0]));
        const maxX = Math.max(...rawData.map(d => d[0]));
        let trend = [];
        for (let x = minX; x <= maxX; x += (maxX-minX)/50) {
            trend.push({ x: x, y: result.predict(x)[1] });
        }

        chartInstance = new Chart(ctx, {
            data: {
                datasets: [{
                    type: 'scatter',
                    label: '실제 데이터',
                    data: rawData.map(d => ({x: d[0], y: d[1]})),
                    backgroundColor: 'blue'
                }, {
                    type: 'line',
                    label: '함수 추세선',
                    data: trend,
                    borderColor: 'red',
                    pointRadius: 0
                }]
            },
            options: { responsive: true }
        });
    }
</script>
</body>
</html>
