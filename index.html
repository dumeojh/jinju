<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 수학 수행평가 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/regression/2.0.1/regression.min.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .user-sticky { background: #eef2f7; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: bold; border-left: 5px solid var(--accent); font-size: 1.1em; color: #2c3e50; }
        #authSection { text-align: center; padding: 40px 10px; }
        .auth-box { display: inline-block; text-align: left; background: #fff; padding: 30px; border: 2px solid var(--accent); border-radius: 15px; width: 100%; max-width: 420px; }
        .auth-row { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        #mainContent { display: none; }
        .section { margin-bottom: 35px; border-bottom: 1px solid #eee; padding-bottom: 25px; }
        .section-title { font-size: 1.25em; font-weight: bold; color: var(--accent); margin-bottom: 15px; border-left: 5px solid var(--accent); padding-left: 12px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .guide-box { background: #e8f4fd; padding: 15px; border-radius: 8px; font-size: 0.95em; color: #34495e; margin-bottom: 15px; border-left: 4px solid #3498db; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .data-item { font-size: 0.9em; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .data-item input { width: 70px; padding: 8px; text-align: center; }
        .btn { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-start { background: var(--accent); padding: 18px; width: 100%; font-size: 1.1em; }
        .btn-calc { background: #27ae60; padding: 15px; width: 100%; margin-bottom: 10px; font-size: 1.1em; }
        .btn-save { background: #2980b9; padding: 18px; flex: 2; font-size: 1.1em; }
        .btn-print { background: #7f8c8d; padding: 18px; flex: 1; font-size: 1.1em; }
        #analysisArea { display: none; margin-top: 30px; background: #fff; padding: 25px; border: 1px solid #ddd; border-radius: 12px; }
        #outFormula { text-align:center; font-size:1.6em; padding:20px; background:#fef4f4; border-radius:8px; margin-bottom:30px; border: 1px solid #fab1a0; min-height: 1.2em; }
        @media print { .no-print { display: none; } #mainContent, #analysisArea { display: block !important; } .container { box-shadow: none; width: 100%; border: none; padding: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div id="stickyHeader" class="user-sticky">📍 [수행평가 진행 중] <span id="displayInfo"></span></div>

    <div id="authSection" class="no-print">
        <h1>📉 실세계 현상 함수 분석 시스템</h1>
        <div class="auth-box">
            <div class="auth-row">
                <label>반 선택</label>
                <select id="gradeClass">
                    <option value="">-- 반 선택 --</option>
                    <option value="2-1">2학년 1반</option><option value="2-2">2학년 2반</option>
                    <option value="2-3">2학년 3반</option><option value="2-4">2학년 4반</option>
                    <option value="2-5">2학년 5반</option><option value="2-6">2학년 6반</option>
                </select>
            </div>
            <div class="auth-row"><label>번호 및 이름</label><div style="display:flex; gap:10px;"><input type="number" id="stuNum" placeholder="번호"><input type="text" id="stuName" placeholder="이름"></div></div>
            <div class="auth-row">
                <label>분석 영역</label>
                <select id="funcArea">
                    <option value="">-- 영역 선택 --</option>
                    <option value="지수함수">지수함수 영역</option>
                    <option value="로그함수">로그함수 영역</option>
                    <option value="삼각함수">삼각함수 영역 (이차근사)</option>
                </select>
            </div>
            <button class="btn btn-start" onclick="startExam()">확인 (시험 시작)</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="section">
            <div class="section-title">2. 기사 제목 및 참고자료</div>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;"><b>기사 제목 :</b><input type="text" id="articleTitle" placeholder="창의적인 제목을 작성하세요"></div>
            <div class="guide-box">참고자료 (최대 3개)</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;"><input type="text" class="ref" placeholder="자료 1"><input type="text" class="ref" placeholder="자료 2"><input type="text" class="ref" placeholder="자료 3"></div>
        </div>

        <div class="section">
            <div class="section-title">3. 주제 선정 이유</div>
            <div class="guide-box">
                실생활 속 함수의 패턴으로 설명할 수 있는 현상이나 함수가 적용된 사례를 찾아 선정 이유와 함께 기술하시오.<br>
                <b>(단, 주제를 선정한 이유를 설명에 포함하시오)</b>
            </div>
            <textarea id="reason" placeholder="이곳에 내용을 작성하세요..." rows="4"></textarea>
        </div>

        <div class="section">
            <div class="section-title">4. 실생활 데이터 입력 (7~10개)</div>
            <div class="data-grid" id="dataInputGrid"></div>
            <button class="btn btn-calc no-print" onclick="runAnalysis()">확인 (그래프 및 식 생성)</button>
        </div>

        <div id="analysisArea">
            <div class="section-title">5. 산점도와 추세선 관찰 및 데이터 해석</div>
            <canvas id="mainChart"></canvas>
            <div id="outFormula"></div>

            <div class="observation-box">
                <label><b>(1) 그래프의 수학적 특징</b></label><textarea id="obs1" placeholder="추세선의 증가/감소 형태, 데이터 경향성 등"></textarea>
                <label style="margin-top:15px; display:block;"><b>(2) 실세계 현상 해석</b></label><textarea id="obs2" placeholder="산출된 식을 선정한 주제와 연관지어 해석"></textarea>
                <label style="margin-top:15px; display:block;"><b>(3) 수학적 유용성 및 가치 성찰</b></label><textarea id="obs3" placeholder="수학의 유용성 및 가치 성찰"></textarea>
            </div>
            <div class="no-print" style="display: flex; gap: 15px; margin-top: 45px;">
                <button id="saveBtn" class="btn btn-save" onclick="saveToSheets()">구글 시트에 최종 제출</button>
                <button class="btn btn-print" onclick="window.print()">PDF 결과물 저장</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwiRUBCWcmUYpHagj2erFNKTwVLTJxImlKS3izITk6Efamif9VbpFp6xP23vsE5xOZt/exec";
    const grid = document.getElementById('dataInputGrid');
    for(let i=1; i<=10; i++) {
        grid.innerHTML += `<div class="data-item">#${i} <input type="number" class="ix" placeholder="x(독립)"> <input type="number" class="iy" placeholder="y(종속)"></div>`;
    }

    function startExam() {
        const cls = document.getElementById('gradeClass').value;
        const num = document.getElementById('stuNum').value;
        const name = document.getElementById('stuName').value;
        const area = document.getElementById('funcArea').value;
        if(!cls || !num || !name || !area) { alert("항목을 모두 입력하세요."); return; }
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('stickyHeader').style.display = 'block';
        document.getElementById('displayInfo').innerText = `${cls} ${num}번 ${name} (영역: ${area})`;
    }

    let chartInstance = null;

    function runAnalysis() {
        const area = document.getElementById('funcArea').value;
        let pts = [];
        const xs = document.querySelectorAll('.ix'), ys = document.querySelectorAll('.iy');
        for(let i=0; i<10; i++) if(xs[i].value && ys[i].value) pts.push([parseFloat(xs[i].value), parseFloat(ys[i].value)]);
        if(pts.length < 7) { alert("데이터를 7개 이상 입력하세요."); return; }
        pts.sort((a,b) => a[0] - b[0]);

        let res;
        if(area === '지수함수') res = regression.exponential(pts);
        else if(area === '로그함수') res = regression.logarithmic(pts);
        else res = regression.polynomial(pts, {order:2});

        const a = res.equation[0].toFixed(4);
        const b = res.equation[1].toFixed(4);
        let latexFormula = "";

        if(area === '지수함수') latexFormula = `\\( y = ${a} \\cdot e^{${b}x} \\)`;
        else if(area === '로그함수') latexFormula = `\\( y = ${a} + ${b} \\ln(x) \\)`;
        else latexFormula = `\\( y = ${a}x^2 + ${res.equation[1].toFixed(4)}x + ${res.equation[2].toFixed(4)} \\)`;

        const formulaDiv = document.getElementById('outFormula');
        
        formulaDiv.innerHTML = `
            <b>산출된 함수식</b><br>
            <div style="font-size: 0.55em; color: #555; font-weight: normal; margin: 8px 0;">
                (작성한 자료를 기반으로 산출된 산점도와 추세선 그래프와 식을 해석하고 이를 선정한 주제와 연관지어 실세계 현상을 해석하시오.)
            </div>
            ${latexFormula}
        `;

        MathJax.typesetPromise([formulaDiv]);

        document.getElementById('analysisArea').style.display = 'block';
        drawChart(pts, res);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function drawChart(pts, res) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        const minX = Math.min(...pts.map(p=>p[0])), maxX = Math.max(...pts.map(p=>p[0]));
        let trend = [];
        for(let x=minX; x<=maxX; x+=(maxX-minX)/50) trend.push({x:x, y:res.predict(x)[1]});
        chartInstance = new Chart(ctx, {
            data: {
                datasets: [
                    { type:'scatter', label:'수집 데이터', data:pts.map(p=>({x:p[0], y:p[1]})), backgroundColor:'#3498db', pointRadius:5 },
                    { type:'line', label:'추세선', data:trend, borderColor:'#e74c3c', borderWidth:3, pointRadius:0, fill:false }
                ]
            },
            options: { scales: { x:{type:'linear', position:'bottom'}, y:{type:'linear'} } }
        });
    }

    async function saveToSheets() {
        const btn = document.getElementById('saveBtn');
        if(!confirm("최종 제출하시겠습니까? 제출 후에는 수정이 불가능합니다.")) return;
        
        btn.disabled = true; btn.innerText = "제출 중...";

        const payload = {
            gradeClass: document.getElementById('gradeClass').value.replace('2-', ''),
            stuNum: document.getElementById('stuNum').value,
            stuName: document.getElementById('stuName').value,
            funcArea: document.getElementById('funcArea').value,
            articleTitle: document.getElementById('articleTitle').value,
            formula: document.getElementById('outFormula').innerText.replace("산출된 함수식", ""),
            obs1: document.getElementById('obs1').value,
            obs2: document.getElementById('obs2').value,
            obs3: document.getElementById('obs3').value
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("구글 시트에 성공적으로 제출되었습니다!");
            btn.innerText = "제출 완료"; btn.style.background = "#2ecc71";
        } catch (e) {
            alert("오류가 발생했습니다. 화면을 캡처한 후 제출하세요.");
            btn.disabled = false; btn.innerText = "다시 제출";
        }
    }
</script>
</body>
</html>
