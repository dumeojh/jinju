<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안성여고 수학 수행평가 프로그램</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/regression/2.0.1/regression.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* 상단 고정 정보 */
        .user-sticky { background: #eef2f7; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: bold; border-left: 5px solid var(--accent); }
        
        /* 인증 섹션 */
        #authSection { text-align: center; padding: 50px 20px; }
        .auth-box { display: inline-block; text-align: left; background: #fff; padding: 30px; border: 1px solid #ddd; border-radius: 10px; }
        .auth-row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }

        /* 메인 콘텐츠 섹션 */
        #mainContent { display: none; }
        .section { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .section-title { font-size: 1.2em; font-weight: bold; color: var(--accent); margin-bottom: 15px; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 100px; resize: none; margin-top: 5px; }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .data-item { background: #fdfdfd; border: 1px solid #eee; padding: 8px; border-radius: 5px; font-size: 0.9em; }
        .data-item input { width: 55px; padding: 5px; display: inline-block; }

        .btn { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn-start { background: var(--accent); color: white; padding: 15px 40px; font-size: 1.1em; width: 100%; }
        .btn-calc { background: #2ecc71; color: white; padding: 12px; width: 100%; font-size: 1.1em; }
        .btn-print { background: #e67e22; color: white; padding: 15px; width: 100%; margin-top: 20px; }

        #analysisArea { display: none; margin-top: 20px; background: #fffaf0; padding: 20px; border-radius: 10px; border: 1px solid #ffeaa7; }
        
        @media print { .no-print { display: none; } #mainContent, #analysisArea { display: block !important; } .container { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div id="stickyHeader" class="user-sticky">
        [수행평가 진행 중] <span id="displayInfo"></span>
    </div>

    <div id="authSection" class="no-print">
        <h1>📝 함수 기사문 작성 수행평가</h1>
        <div class="auth-box">
            <div class="auth-row">
                <label>반 선택</label>
                <select id="gradeClass">
                    <option value="">-- 반 선택 --</option>
                    <option value="2-1">2학년 1반</option>
                    <option value="2-2">2학년 2반</option>
                    <option value="2-3">2학년 3반</option>
                    <option value="2-4">2학년 4반</option>
                </select>
            </div>
            <div class="auth-row">
                <label>번호 및 이름</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="stuNum" placeholder="번호">
                    <input type="text" id="stuName" placeholder="이름">
                </div>
            </div>
            <div class="auth-row">
                <label>분석 함수 영역</label>
                <select id="funcArea">
                    <option value="">-- 영역 선택 --</option>
                    <option value="exponential">지수함수</option>
                    <option value="logarithmic">로그함수</option>
                    <option value="polynomial">삼각함수(이차근사)</option>
                </select>
            </div>
            <button class="btn btn-start" onclick="startExam()">확인 (시험 시작)</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="section">
            <div class="section-title">2. 기사 제목 및 주제 선정 이유</div>
            <input type="text" id="articleTitle" placeholder="기사 제목을 입력하세요" style="margin-bottom:10px;">
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-bottom:10px;">
                <input type="text" class="ref" placeholder="참고자료 1">
                <input type="text" class="ref" placeholder="참고자료 2">
                <input type="text" class="ref" placeholder="참고자료 3">
            </div>
            <textarea id="reason" placeholder="주제를 선정한 이유와 실생활 배경을 설명하세요."></textarea>
        </div>

        <div class="section">
            <div class="section-title">4. 실생활 데이터 입력 (7~10개)</div>
            <div class="data-grid" id="dataInputGrid"></div>
            <button class="btn btn-calc no-print" onclick="runAnalysis()">데이터 분석 및 그래프 생성</button>
        </div>

        <div id="analysisArea">
            <div class="section-title">5. 산점도와 추세선 관찰 및 데이터 해석</div>
            <canvas id="mainChart" style="background:#fff; margin-bottom:15px; border-radius:5px;"></canvas>
            <div id="outFormula" style="text-align:center; font-weight:bold; color:#d63031; margin-bottom:20px;"></div>

            <div class="observation-box">
                <label><b>(1) 그래프의 수학적 특징</b></label>
                <textarea id="obs1" placeholder="추세선의 증가/감소 형태, 점들의 밀집도, 함수식의 상수값 의미 등을 작성하세요."></textarea>
                
                <label style="margin-top:15px;"><b>(2) 실세계 현상 해석</b></label>
                <textarea id="obs2" placeholder="도출된 그래프와 식이 실제 수집한 주제(현상)를 어떻게 설명하고 있는지 해석하세요."></textarea>
                
                <label style="margin-top:15px;"><b>(3) 수학의 유용성 및 가치 성찰</b></label>
                <textarea id="obs3" placeholder="이번 탐구를 통해 느낀 수학적 모델링의 가치와 유용성을 성찰하여 작성하세요."></textarea>
            </div>
            
            <button class="btn btn-print no-print" onclick="window.print()">최종 결과물 PDF 저장 / 인쇄</button>
        </div>
    </div>
</div>

<script>
    // 데이터 입력칸 초기화 (10개)
    const grid = document.getElementById('dataInputGrid');
    for(let i=1; i<=10; i++) {
        grid.innerHTML += `<div class="data-item">#${i} x:<input type="number" class="ix"> y:<input type="number" class="iy"></div>`;
    }

    // 시험 시작 함수
    function startExam() {
        const cls = document.getElementById('gradeClass').value;
        const num = document.getElementById('stuNum').value;
        const name = document.getElementById('stuName').value;
        const area = document.getElementById('funcArea').value;

        if(!cls || !num || !name || !area) {
            alert("모든 정보와 분석 영역을 선택해야 시험을 시작할 수 있습니다.");
            return;
        }

        alert(`${cls} ${num}번 ${name} 학생, 시험을 시작합니다.`);
        
        // 화면 전환
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('stickyHeader').style.display = 'block';
        document.getElementById('displayInfo').innerText = `${cls} ${num}번 ${name} (영역: ${area})`;
    }

    let chartInstance = null;

    // 분석 실행 함수
    function runAnalysis() {
        const area = document.getElementById('funcArea').value;
        let points = [];
        const xs = document.querySelectorAll('.ix'), ys = document.querySelectorAll('.iy');
        
        for(let i=0; i<10; i++) {
            if(xs[i].value && ys[i].value) points.push([parseFloat(xs[i].value), parseFloat(ys[i].value)]);
        }

        if(points.length < 7) {
            alert("정확한 분석을 위해 최소 7개의 데이터를 입력해 주세요.");
            return;
        }

        points.sort((a,b) => a[0] - b[0]);

        // 회귀 계산
        let result;
        if(area === 'exponential') result = regression.exponential(points);
        else if(area === 'logarithmic') result = regression.logarithmic(points);
        else result = regression.polynomial(points, {order:2});

        // 그래프 영역 노출
        document.getElementById('analysisArea').style.display = 'block';
        document.getElementById('outFormula').innerText = `[산출된 함수식] ${result.string}`;

        // 그래프 그리기
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();

        const minX = Math.min(...points.map(p=>p[0])), maxX = Math.max(...points.map(p=>p[0]));
        let trendLine = [];
        for(let x=minX; x<=maxX; x+=(maxX-minX)/50) trendLine.push({x:x, y:result.predict(x)[1]});

        chartInstance = new Chart(ctx, {
            data: {
                datasets: [
                    { type:'scatter', label:'수집 데이터', data:points.map(p=>({x:p[0], y:p[1]})), backgroundColor:'#3498db' },
                    { type:'line', label:'추세선', data:trendLine, borderColor:'#e74c3c', fill:false, pointRadius:0 }
                ]
            },
            options: { scales: { x:{type:'linear', position:'bottom'} } }
        });

        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
